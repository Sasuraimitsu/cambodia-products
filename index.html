<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dam Mo - カンボジア伝統の熟成塩ライム</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="bento-container">
        <div class="bento-box box-hero">
            <div class="character-bubble bubble-float" id="hero-bubble">「3ヶ月待った自信作だよ！」</div>
            <h1>3ヶ月、太陽と眠り、塩と目覚める。</h1>
            <p>黄金色の半透明。それは100年前から続くカンボジアの知恵。</p>
            <img src="assets/char-hero.png" class="char-float" alt="Dam Mo Character">
        </div>

        <div class="bento-box box-history">
            <h3>祝宴の記憶</h3>
            <p>Ngam Ngaoスープは、伝統的に結婚式などの祝宴で愛されてきた特別な味です [2, 1]。</p>
            <img src="assets/soup-photo.jpg" class="product-photo" alt="Traditional Soup">
        </div>

        <div class="bento-box box-sun">
            <h4>華氏104度の魔法</h4>
            <p>皮が褐色に輝くまで、熱い太陽の下で1週間干し、3ヶ月以上熟成させます [3]。</p>
        </div>

        <div class="bento-box box-ingredients">
            <h4>香りの三要素</h4>
            <ul class="ingredient-list">
                <li>Romdeng（ガランガル）</li>
                <li>Slek Krey（レモングラス）</li>
                <li>Slek Krouch Soeuch（こぶみかんの葉）</li>
            </ul>
            <img src="assets/char-point.png" class="char-static" alt="Explain Character">
        </div>

        <div class="bento-box box-cta">
            <div class="cta-content">
                <h3>今すぐ体験する</h3>
                <p>限定セット：熟成ライム＆スパイス</p>
            </div>
            <button class="buy-button" id="cart-button">
                カートに入れる
            </button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
